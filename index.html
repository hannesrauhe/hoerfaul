<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#2563eb">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <title>Hörfaul</title>
</head>
<body>
  <script src="coi-serviceworker.js"></script>

  <main>
    <header>
      <h1>Hörfaul</h1>
      <p class="subtitle">On-device voice message transcription</p>
    </header>

    <section id="model-section" class="model-section" hidden>
      <p id="model-label">Loading speech recognition model…</p>
      <div class="progress-track">
        <div id="progress-fill" class="progress-fill"></div>
      </div>
      <p id="model-detail" class="model-detail"></p>
    </section>

    <section id="compat-section" class="compat-warning" hidden>
      <p id="compat-message"></p>
    </section>

    <div id="drop-zone" class="drop-zone" role="button" tabindex="0"
         aria-label="Choose audio files" aria-disabled="true">
      <svg class="drop-icon" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
           aria-hidden="true">
        <polyline points="2 12 5 12 5 8 8 8 8 16 11 16 11 4 14 4 14 20 17 20 17 12 20 12 22 12"/>
      </svg>
      <p class="drop-label">Drop voice messages here</p>
      <p class="drop-hint" id="drop-hint">Loading model…</p>
      <input id="file-input" type="file" accept="audio/*" multiple hidden>
    </div>

    <section id="queue" class="queue" aria-label="Transcriptions" aria-live="polite"></section>

    <div id="toolbar" class="toolbar" hidden>
      <button id="btn-copy-all" class="btn btn-secondary">Copy all</button>
      <button id="btn-clear-all" class="btn btn-danger">Clear all</button>
    </div>

    <!-- Future hook: summarize button (disabled until LLM API key is configured) -->
    <!-- <button id="btn-summarize" class="btn btn-primary" hidden disabled>Summarize all</button> -->
  </main>

  <div id="toast" class="toast" aria-live="assertive"></div>

  <script type="module" src="app.js"></script>
</body>
</html>
