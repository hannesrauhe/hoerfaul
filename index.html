<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#2563eb">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="stylesheet" href="style.css">
  <title>Hörfaul</title>
</head>
<body>
  <script src="coi-serviceworker.js"></script>

  <main>
    <header>
      <h1>Hörfaul</h1>
      <p class="subtitle">On-device voice message transcription</p>
    </header>

    <section id="model-section" class="model-section">
      <div id="model-pick" class="model-pick">
        <select id="model-select" aria-label="Speech recognition model">
          <option value="german" selected>German fine-tune (large-v3-turbo) · ~250 MB</option>
          <option value="tiny">Whisper Tiny · ~60 MB</option>
          <option value="base">Whisper Base · ~110 MB</option>
          <option value="small">Whisper Small · ~310 MB</option>
        </select>
        <button id="btn-load-model" class="btn btn-primary">Load model</button>
      </div>
      <p id="model-label" class="model-status" hidden></p>
      <div id="model-progress" hidden>
        <div class="progress-track">
          <div id="progress-fill" class="progress-fill"></div>
        </div>
        <p id="model-detail" class="model-detail"></p>
      </div>
    </section>

    <section id="compat-section" class="compat-warning" hidden>
      <p id="compat-message"></p>
    </section>

    <div id="drop-zone" class="drop-zone" role="button" tabindex="0"
         aria-label="Load transcription model">
      <svg class="drop-icon" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
           aria-hidden="true">
        <polyline points="2 12 5 12 5 8 8 8 8 16 11 16 11 4 14 4 14 20 17 20 17 12 20 12 22 12"/>
      </svg>
      <p class="drop-label">Drop a voice message here</p>
      <p class="drop-hint" id="drop-hint">Tap to load the model, then drop your file</p>
      <input id="file-input" type="file" accept="audio/*" hidden>
    </div>

    <div class="settings-row">
      <label for="lang-select">Language</label>
      <select id="lang-select">
        <option value="german" selected>Deutsch</option>
        <option value="">Auto-detect</option>
        <option value="english">English</option>
        <option value="french">Français</option>
        <option value="spanish">Español</option>
        <option value="italian">Italiano</option>
        <option value="dutch">Nederlands</option>
        <option value="polish">Polski</option>
        <option value="portuguese">Português</option>
        <option value="russian">Русский</option>
        <option value="turkish">Türkçe</option>
        <option value="arabic">العربية</option>
        <option value="japanese">日本語</option>
        <option value="chinese">中文</option>
      </select>
    </div>

    <section id="queue" class="queue" aria-label="Transcriptions" aria-live="polite"></section>

    <div id="toolbar" class="toolbar" hidden>
      <button id="btn-copy-all" class="btn btn-secondary">Copy all</button>
      <button id="btn-clear-all" class="btn btn-danger">Clear all</button>
    </div>

    <!-- Future hook: summarize button (disabled until LLM API key is configured) -->
    <!-- <button id="btn-summarize" class="btn btn-primary" hidden disabled>Summarize all</button> -->
  </main>

  <div id="toast" class="toast" aria-live="assertive"></div>

  <script type="module" src="app.js"></script>
</body>
</html>
